name: Scan and publish dashboard

on:
  workflow_dispatch:
  schedule:
    # Toutes les 2 heures. Modifier cette cron si besoin.
    - cron: "0 */2 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright>=1.40.0
          python -m playwright install chromium

      - name: Run scan
        env:
          PYTHONPATH: src
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: |
          # Use --use-browser to contour Cloudflare/WAF protections
          # (slower but more reliable for blocked sites like Darty, Leroy Merlin, ManoMano)
          # Remove the comment below to enable browser mode:
          BROWSER_FLAG="--use-browser"
          
          python -m stock_alert.cli \
            --sites config/sites.yaml \
            --watchlist config/watchlist.yaml \
            --json-out docs/latest.json \
            --html-out docs/index.html \
            ${BROWSER_FLAG:-}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: scan
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
